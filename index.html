<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Drill & Collocations</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0ede8;--surface:#faf8f4;--card:#ffffff;
  --ink:#1c1814;--ink2:#6b5f52;--muted:#b8a898;--border:#e4ddd4;
  --red:#e63946;--green:#2a9d5c;--blue:#2563eb;--amber:#d97706;
  --purple:#7c3aed;--teal:#0d9488;
  --error-accent:#e63946;--coll-accent:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ede8;color:#1c1814;font-family:'Sora',sans-serif;min-height:100vh}

/* ── HEADER ── */
.hdr{background:#1c1814;padding:16px 22px;display:flex;align-items:center;gap:14px}
.hdr-logo{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.hdr h1{font-size:1.15rem;font-weight:800;color:#fff}
.hdr h1 span{color:#fbbf24}
.hdr p{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:2px}
.hdr-score{margin-left:auto;text-align:right}
.hdr-score-num{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:500;color:#fbbf24;line-height:1}
.hdr-score-lbl{font-size:.65rem;color:rgba(255,255,255,.35)}

/* ── MODE BAR ── */
.mode-bar{background:#1c1814;border-bottom:3px solid #fbbf24;display:flex;padding:0 16px}
.mode-btn{padding:12px 20px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.35);border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .2s}
.mode-btn:hover{color:rgba(255,255,255,.7)}
.mode-btn.active{color:#fbbf24;border-bottom-color:#fbbf24}

.section{display:none}.section.active{display:block}

/* ── WRAP ── */
.wrap{max-width:740px;margin:0 auto;padding:26px 14px 80px}

/* ── LEVEL BAR ── */
.level-row{display:flex;gap:8px;margin-bottom:22px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.level-row::-webkit-scrollbar{display:none}
.lvl-btn{padding:7px 16px;border-radius:20px;cursor:pointer;font-family:'Sora',sans-serif;font-size:.75rem;font-weight:700;border:1.5px solid var(--border);background:#ffffff;color:#6b5f52;white-space:nowrap;transition:all .2s}
.lvl-btn:hover{border-color:#1c1814}
.lvl-btn.active-err{background:var(--error-accent);border-color:var(--error-accent);color:#fff}
.lvl-btn.active-col{background:var(--coll-accent);border-color:var(--coll-accent);color:#fff}

/* ── STATS ROW ── */
.stats-row{display:flex;gap:10px;margin-bottom:20px}
.stat-box{flex:1;background:#ffffff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center}
.stat-val{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;line-height:1}
.stat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* ── QUESTION CARD ── */
.qcard{background:#ffffff;border:1.5px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:14px;transition:border-color .3s}
.qcard.ok{border-color:var(--green)}.qcard.fail{border-color:var(--red)}

.qcard-top{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.qcard-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{width:28px;height:28px;border-radius:8px;background:#1c1814;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;flex-shrink:0}
.qcard.ok .q-num{background:var(--green)}.qcard.fail .q-num{background:var(--red)}
.q-type-tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:20px;margin-left:auto}
.tag-tense{background:rgba(37,99,235,.12);color:var(--blue)}
.tag-article{background:rgba(217,119,6,.12);color:var(--amber)}
.tag-prep{background:rgba(13,148,136,.12);color:var(--teal)}
.tag-agreement{background:rgba(124,58,237,.12);color:var(--purple)}
.tag-modal{background:rgba(42,157,92,.12);color:var(--green)}
.tag-word-order{background:rgba(230,57,70,.12);color:var(--red)}
.tag-collocations{background:rgba(124,58,237,.12);color:var(--purple)}
.tag-verb-noun{background:rgba(37,99,235,.12);color:var(--blue)}
.tag-adj-noun{background:rgba(13,148,136,.12);color:var(--teal)}
.tag-adv-adj{background:rgba(217,119,6,.12);color:var(--amber)}

.q-instruction{font-size:.78rem;color:var(--muted);margin-bottom:8px}

/* ERROR DRILL: sentence with blank/highlight */
.sentence-wrap{background:#faf8f4;border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:1rem;line-height:1.7;font-family:'DM Mono',monospace;color:#1c1814}
.err-word{background:rgba(230,57,70,.15);border-bottom:2px solid var(--red);padding:1px 4px;border-radius:3px;color:var(--red);font-weight:500;cursor:default}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--muted);margin:0 4px;text-align:center;font-style:italic;color:var(--muted)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;padding:14px 18px}
.opt{display:flex;align-items:center;gap:10px;background:#faf8f4;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;font-size:.88rem;color:#1c1814;transition:all .15s;user-select:none}
.opt:hover:not(.disabled){border-color:#1c1814}
.opt.selected{border-color:var(--blue);background:rgba(37,99,235,.07)}
.opt.correct{border-color:var(--green);background:rgba(42,157,92,.08);color:var(--green);font-weight:600}
.opt.wrong{border-color:var(--red);background:rgba(230,57,70,.07);color:var(--red)}
.opt.disabled{cursor:default}
.opt-l{width:26px;height:26px;flex-shrink:0;border-radius:7px;border:1.5px solid var(--border);background:#ffffff;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500}
.opt.correct .opt-l{background:var(--green);color:#fff;border-color:var(--green)}
.opt.wrong .opt-l{background:var(--red);color:#fff;border-color:var(--red)}
.opt.selected .opt-l{background:var(--blue);color:#fff;border-color:var(--blue)}

/* FEEDBACK */
.fb{margin:0 18px 16px;padding:12px 14px;border-radius:10px;font-size:.82rem;line-height:1.6;display:none}
.fb.show{display:block}
.fb.ok{background:rgba(42,157,92,.08);border:1px solid rgba(42,157,92,.25);color:#14532d}
.fb.fail{background:rgba(230,57,70,.07);border:1px solid rgba(230,57,70,.2);color:#7f1d1d}
.corrected{margin-top:8px;padding:8px 12px;background:rgba(42,157,92,.1);border-radius:7px;font-family:'DM Mono',monospace;font-size:.83rem;color:#14532d}

/* COLLOCATIONS: match / fill */
.coll-match{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px}
@media(max-width:480px){.coll-match{grid-template-columns:1fr}}
.match-left,.match-right{display:flex;flex-direction:column;gap:6px}
.match-head{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:4px}
.match-item{background:#faf8f4;border:1.5px solid var(--border);border-radius:9px;padding:9px 13px;font-size:.85rem;cursor:pointer;transition:all .15s;user-select:none}
.match-item:hover:not(.disabled){border-color:var(--purple)}
.match-item.selected-left{border-color:var(--purple);background:rgba(124,58,237,.08);color:var(--purple);font-weight:600}
.match-item.matched-ok{border-color:var(--green);background:rgba(42,157,92,.08);color:var(--green);font-weight:600;cursor:default}
.match-item.matched-fail{border-color:var(--red);background:rgba(230,57,70,.07);color:var(--red);cursor:default}
.match-item.disabled{cursor:default;opacity:.6}

/* PROGRESS BAR */
.prog-strip{height:3px;background:var(--border);margin-bottom:0}
.prog-fill{height:100%;transition:width .4s ease}
.prog-error{background:var(--error-accent)}.prog-coll{background:var(--coll-accent)}

/* COMPLETE */
.complete-box{background:#ffffff;border:1.5px solid var(--border);border-radius:20px;padding:36px 24px;text-align:center;display:none}
.complete-box.show{display:block}
.complete-emoji{font-size:3.5rem;margin-bottom:12px}
.complete-score{font-family:'DM Mono',monospace;font-size:3.5rem;font-weight:500;line-height:1;margin-bottom:4px}
.complete-lbl{font-size:.82rem;color:var(--muted);margin-bottom:20px}
.complete-grade{font-size:1.1rem;font-weight:700;margin-bottom:18px}
.complete-breakdown{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.cb-chip{padding:8px 16px;border-radius:20px;font-size:.78rem;font-weight:700}
.cb-ok{background:rgba(42,157,92,.1);color:var(--green)}
.cb-fail{background:rgba(230,57,70,.08);color:var(--red)}
.restart-row{display:flex;gap:8px;justify-content:center}
.restart-btn{padding:11px 24px;border-radius:10px;border:none;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s}
.rb-primary{background:#1c1814;color:#fff}.rb-primary:hover{background:#333}
.rb-secondary{background:#faf8f4;border:1.5px solid var(--border);color:#6b5f52}.rb-secondary:hover{border-color:#1c1814}

@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.qcard{animation:slideUp .3s ease both}
.qcard:nth-child(2){animation-delay:.05s}.qcard:nth-child(3){animation-delay:.1s}
.qcard:nth-child(4){animation-delay:.15s}.qcard:nth-child(5){animation-delay:.2s}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo" id="hdr-logo">🎯</div>
  <div>
    <h1>Error <span>Drill</span> & Collocations</h1>
    <p>Identifica errores · Aprende combinaciones naturales</p>
  </div>
  <div class="hdr-score">
    <div class="hdr-score-num" id="global-score">0</div>
    <div class="hdr-score-lbl">puntos</div>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="mb-error" onclick="switchMode('error')">🎯 Error Correction</button>
  <button class="mode-btn" id="mb-coll" onclick="switchMode('coll')">🔗 Collocations</button>
</div>

<div class="prog-strip"><div class="prog-fill prog-error" id="prog-fill" style="width:0%"></div></div>

<!-- ══ ERROR CORRECTION ══ -->
<div class="section active" id="sec-error">
<div class="wrap">
  <div class="level-row" id="err-levels"></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="err-correct" style="color:var(--green)">0</div><div class="stat-lbl">✅ Correctas</div></div>
    <div class="stat-box"><div class="stat-val" id="err-wrong" style="color:var(--red)">0</div><div class="stat-lbl">❌ Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val" id="err-left" style="color:var(--amber)">0</div><div class="stat-lbl">🃏 Quedan</div></div>
  </div>
  <div id="err-cards"></div>
  <div class="complete-box" id="err-complete">
    <div class="complete-emoji">🎉</div>
    <div class="complete-score" id="err-final-score" style="color:var(--error-accent)">0/0</div>
    <div class="complete-lbl">respuestas correctas</div>
    <div class="complete-grade" id="err-grade"></div>
    <div class="complete-breakdown">
      <div class="cb-chip cb-ok">✅ <span id="err-cb-ok">0</span> correctas</div>
      <div class="cb-chip cb-fail">❌ <span id="err-cb-fail">0</span> incorrectas</div>
    </div>
    <div class="restart-row">
      <button class="restart-btn rb-primary" onclick="restartErr(false)">↺ Repetir nivel</button>
      <button class="restart-btn rb-secondary" onclick="restartErr(true)">🔀 Nuevo nivel</button>
    </div>
  </div>
</div>
</div>

<!-- ══ COLLOCATIONS ══ -->
<div class="section" id="sec-coll">
<div class="wrap">
  <div class="level-row" id="coll-levels"></div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="coll-correct" style="color:var(--green)">0</div><div class="stat-lbl">✅ Correctas</div></div>
    <div class="stat-box"><div class="stat-val" id="coll-wrong" style="color:var(--red)">0</div><div class="stat-lbl">❌ Incorrectas</div></div>
    <div class="stat-box"><div class="stat-val" id="coll-left" style="color:var(--amber)">0</div><div class="stat-lbl">🃏 Quedan</div></div>
  </div>
  <div id="coll-cards"></div>
  <div class="complete-box" id="coll-complete">
    <div class="complete-emoji">🔗</div>
    <div class="complete-score" id="coll-final-score" style="color:var(--coll-accent)">0/0</div>
    <div class="complete-lbl">collocations correctas</div>
    <div class="complete-grade" id="coll-grade"></div>
    <div class="complete-breakdown">
      <div class="cb-chip cb-ok">✅ <span id="coll-cb-ok">0</span> correctas</div>
      <div class="cb-chip cb-fail">❌ <span id="coll-cb-fail">0</span> incorrectas</div>
    </div>
    <div class="restart-row">
      <button class="restart-btn rb-primary" onclick="restartColl(false)">↺ Repetir categoría</button>
      <button class="restart-btn rb-secondary" onclick="restartColl(true)">🔀 Nueva categoría</button>
    </div>
  </div>
</div>
</div>

<script>
// ════════════════════════════════════════════════
//  ERROR CORRECTION DATA
// ════════════════════════════════════════════════
const ERROR_LEVELS = {
  'Verb Tenses': [
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'She <span class="err-word">go</span> to the market every Sunday.',
      instruction:'Find the error and select the correct form:',
      opts:['goes','is going','went','has gone'], ans:0,
      corrected:'She <strong>goes</strong> to the market every Sunday.',
      exp:'With <em>she/he/it</em> in Present Simple, add <strong>-s</strong> to the verb: <em>goes</em>. The adverb "every Sunday" confirms it is a habitual action.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'I <span class="err-word">have seen</span> him yesterday at the store.',
      instruction:'Find the error and select the correct form:',
      opts:['saw','see','was seeing','had seen'], ans:0,
      corrected:'I <strong>saw</strong> him yesterday at the store.',
      exp:'"Yesterday" is a specific past time marker → use <strong>Past Simple</strong>, not Present Perfect. Present Perfect cannot be used with specific past time expressions.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'When I arrived, she <span class="err-word">already left</span>.',
      instruction:'Find the error and select the correct form:',
      opts:['had already left','has already left','already leaves','was already leaving'], ans:0,
      corrected:'When I arrived, she <strong>had already left</strong>.',
      exp:'Two actions in the past: the one that happened <em>first</em> uses <strong>Past Perfect (had + past participle)</strong>. She left → then → I arrived.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'He <span class="err-word">is working</span> here since 2019.',
      instruction:'Find the error and select the correct form:',
      opts:['has been working','works','was working','had worked'], ans:0,
      corrected:'He <strong>has been working</strong> here since 2019.',
      exp:'"Since 2019" signals an action that started in the past and continues now → <strong>Present Perfect Continuous</strong>: has/have been + verb-ing.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'By next year, she <span class="err-word">will finish</span> her degree.',
      instruction:'For a more precise future perfect form, select:',
      opts:['will have finished','is finishing','finishes','has finished'], ans:0,
      corrected:'By next year, she <strong>will have finished</strong> her degree.',
      exp:'"By next year" indicates completion before a future point → <strong>Future Perfect</strong>: will have + past participle.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'I <span class="err-word">work</span> on the report when the power went out.',
      instruction:'Find the error and select the correct form:',
      opts:['was working','had worked','have worked','am working'], ans:0,
      corrected:'I <strong>was working</strong> on the report when the power went out.',
      exp:'An ongoing action interrupted by another → <strong>Past Continuous</strong> (was/were + -ing) + Past Simple for the interruption.'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'If she <span class="err-word">studies</span> harder, she would pass the exam.',
      instruction:'Find the error in this conditional:',
      opts:['studied','will study','had studied','was studying'], ans:0,
      corrected:'If she <strong>studied</strong> harder, she would pass the exam.',
      exp:'Second conditional (hypothetical present/future): <strong>If + Past Simple, would + base verb</strong>. "Studied" (past simple) is correct here, not "studies".'
    },
    {
      type:'tense', tag:'tag-tense', label:'Verb Tense',
      sentence:'He <span class="err-word">didn\'t ate</span> anything this morning.',
      instruction:'Find the error and select the correct form:',
      opts:["didn't eat",'doesn\'t eat','hadn\'t eaten','wasn\'t eating'], ans:0,
      corrected:'He <strong>didn\'t eat</strong> anything this morning.',
      exp:'After <strong>did/didn\'t</strong>, always use the <strong>base form</strong> of the verb, never the past tense: didn\'t <em>eat</em>, not didn\'t <em>ate</em>.'
    },
  ],
  'Articles': [
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'She is <span class="err-word">a</span> best student in the class.',
      instruction:'Find the article error:',
      opts:['the','an','—  (no article)','some'], ans:0,
      corrected:'She is <strong>the</strong> best student in the class.',
      exp:'Superlatives require <strong>the</strong>: <em>the best, the most, the tallest</em>. Never use "a/an" with superlatives.'
    },
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'I need <span class="err-word">an</span> honest advice from you.',
      instruction:'Find the article error:',
      opts:['—  (no article)','a','the','some'], ans:3,
      corrected:'I need <strong>some</strong> honest advice from you.',
      exp:'"Advice" is an uncountable noun → cannot use a/an. Use <strong>some advice</strong> or simply "advice." Note: "an" before "honest" would be correct pronunciation-wise, but the error is using an article with uncountable nouns.'
    },
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'He plays <span class="err-word">the</span> football every weekend.',
      instruction:'Find the article error:',
      opts:['—  (no article)','a','an','his'], ans:0,
      corrected:'He plays <strong>football</strong> every weekend.',
      exp:'With sports and games, use <strong>no article</strong>: play football, play chess, play tennis. NOT "the football" (unless referring to a specific ball).'
    },
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'She wants to become <span class="err-word">the</span> doctor.',
      instruction:'Find the article error:',
      opts:['a','an','—  (no article)','one'], ans:0,
      corrected:'She wants to become <strong>a</strong> doctor.',
      exp:'When talking about professions generally (one of many), use <strong>a/an</strong>: <em>a doctor, a teacher, an engineer</em>. "The doctor" implies a specific, known doctor.'
    },
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'We visited <span class="err-word">a</span> Eiffel Tower last summer.',
      instruction:'Find the article error:',
      opts:['the','an','—  (no article)','that'], ans:0,
      corrected:'We visited <strong>the</strong> Eiffel Tower last summer.',
      exp:'Unique, one-of-a-kind landmarks use <strong>the</strong>: <em>the Eiffel Tower, the Amazon River, the Sun</em>.'
    },
    {
      type:'article', tag:'tag-article', label:'Article',
      sentence:'Life is <span class="err-word">the</span> too short to waste time.',
      instruction:'Find the article error:',
      opts:['—  (no article)','a','so','very'], ans:0,
      corrected:'Life is <strong>too</strong> short to waste time.',
      exp:'When making general statements about abstract concepts like "life", "love", "nature", use <strong>no article</strong>: <em>Life is beautiful.</em> Also, "the too" is grammatically impossible.'
    },
  ],
  'Prepositions': [
    {
      type:'prep', tag:'tag-prep', label:'Preposition',
      sentence:'She has been married <span class="err-word">since</span> ten years.',
      instruction:'Find the preposition error:',
      opts:['for','during','in','by'], ans:0,
      corrected:'She has been married <strong>for</strong> ten years.',
      exp:'<strong>For</strong> = duration of time (a period). <strong>Since</strong> = starting point. "For ten years" (duration) vs "since 2014" (starting point).'
    },
    {
      type:'prep', tag:'tag-prep', label:'Preposition',
      sentence:'I will meet you <span class="err-word">on</span> Monday morning <span class="err-word">on</span> 9 o\'clock.',
      instruction:'What is the correct preposition before "9 o\'clock"?',
      opts:['at','in','by','from'], ans:0,
      corrected:'I will meet you on Monday morning <strong>at</strong> 9 o\'clock.',
      exp:'Time prepositions: <strong>AT</strong> for specific times (at 9 o\'clock, at noon). ON for days (on Monday). IN for months/years (in January, in 2024).'
    },
    {
      type:'prep', tag:'tag-prep', label:'Preposition',
      sentence:'He is very good <span class="err-word">in</span> mathematics.',
      instruction:'Find the preposition error:',
      opts:['at','on','for','with'], ans:0,
      corrected:'He is very good <strong>at</strong> mathematics.',
      exp:'The correct collocation is <strong>good at</strong> + skill/subject. Similarly: bad at, excellent at, terrible at.'
    },
    {
      type:'prep', tag:'tag-prep', label:'Preposition',
      sentence:'The book is different <span class="err-word">than</span> I expected.',
      instruction:'Find the preposition error:',
      opts:['from','with','to','of'], ans:0,
      corrected:'The book is different <strong>from</strong> what I expected.',
      exp:'In British and standard English, use <strong>different from</strong>. "Different than" is accepted in informal American English, but "different from" is the standard form for TOEFL/academic writing.'
    },
    {
      type:'prep', tag:'tag-prep', label:'Preposition',

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let mode = 'error';
let globalScore = 0;

// ERROR STATE
let errLevel = Object.keys(ERROR_LEVELS)[0];
let errDeck = [], errAnswers = {}, errCorrect = 0, errWrong = 0;

// COLL STATE
let collCat = Object.keys(COLL_CATEGORIES)[0];
let collDeck = [], collAnswers = {}, collCorrect = 0, collWrong = 0;

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
function init(){
  buildErrLevels();
  buildCollLevels();
  loadErr(errLevel);
  loadColl(collCat);
}

function buildErrLevels(){
  const el = document.getElementById('err-levels');
  el.innerHTML = '';
  Object.keys(ERROR_LEVELS).forEach(lv => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (lv===errLevel?' active-err':'');
    btn.textContent = lv;
    btn.onclick = () => { errLevel=lv; loadErr(lv); document.querySelectorAll('#err-levels .lvl-btn').forEach(b=>b.classList.remove('active-err')); btn.classList.add('active-err'); };
    el.appendChild(btn);
  });
}

function buildCollLevels(){
  const el = document.getElementById('coll-levels');
  el.innerHTML = '';
  Object.keys(COLL_CATEGORIES).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn' + (cat===collCat?' active-col':'');
    btn.textContent = cat;
    btn.onclick = () => { collCat=cat; loadColl(cat); document.querySelectorAll('#coll-levels .lvl-btn').forEach(b=>b.classList.remove('active-col')); btn.classList.add('active-col'); };
    el.appendChild(btn);
  });
}

// ════════════════════════════════════════════════
//  ERROR CORRECTION
// ════════════════════════════════════════════════
function loadErr(level){
  errDeck = [...ERROR_LEVELS[level]];
  errAnswers = {}; errCorrect = 0; errWrong = 0;
  document.getElementById('err-complete').classList.remove('show');
  renderErrCards();
  updateErrStats();
  updateProg('error');
}

function renderErrCards(){
  const container = document.getElementById('err-cards');
  container.innerHTML = '';
  errDeck.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'qcard'; card.id = `ecard-${i}`;
    const letters = ['A','B','C','D'];
    card.innerHTML = `
      <div class="qcard-top">
        <div class="qcard-meta">
          <div class="q-num" id="enum-${i}">${i+1}</div>
          <span class="q-type-tag ${q.tag}">${q.label}</span>
        </div>
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">${q.instruction}</div>
        <div class="sentence-wrap">${q.sentence}</div>
      </div>
      <div class="opts" id="eopts-${i}">
        ${q.opts.map((o,oi)=>`<div class="opt" id="eopt-${i}-${oi}" onclick="pickErr(${i},${oi})"><span class="opt-l">${letters[oi]}</span>${o}</div>`).join('')}
      </div>
      <div class="fb" id="efb-${i}"></div>`;
    container.appendChild(card);
  });
}

function pickErr(qi, oi){
  if(errAnswers[qi] !== undefined) return;
  errAnswers[qi] = oi;
  const q = errDeck[qi];
  const correct = oi === q.ans;
  if(correct){ errCorrect++; globalScore+=10; } else errWrong++;

  ['A','B','C','D'].forEach((_,i)=>{
    const el = document.getElementById(`eopt-${qi}-${i}`);
    if(!el) return;
    el.classList.add('disabled');
    if(i===q.ans) el.classList.add('correct');
    else if(i===oi&&!correct) el.classList.add('wrong');
  });

  const card = document.getElementById(`ecard-${qi}`);
  const num  = document.getElementById(`enum-${qi}`);
  const fb   = document.getElementById(`efb-${qi}`);
  card.classList.add(correct?'ok':'fail');
  num.textContent = correct?'✓':'✗';
  fb.innerHTML = `${correct?'✅ <strong>Correct!</strong>':'❌ <strong>Incorrect.</strong>'} ${q.exp}<div class="corrected">✓ ${q.corrected}</div>`;
  fb.className = `fb show ${correct?'ok':'fail'}`;

  document.getElementById('global-score').textContent = globalScore;
  updateErrStats();
  updateProg('error');

  if(Object.keys(errAnswers).length === errDeck.length){
    setTimeout(()=>showErrComplete(), 600);
  }
}

function updateErrStats(){
  document.getElementById('err-correct').textContent = errCorrect;
  document.getElementById('err-wrong').textContent   = errWrong;
  document.getElementById('err-left').textContent    = errDeck.length - Object.keys(errAnswers).length;
}

function showErrComplete(){
  const pct = Math.round(errCorrect/errDeck.length*100);
  document.getElementById('err-final-score').textContent = `${errCorrect}/${errDeck.length}`;
  document.getElementById('err-cb-ok').textContent   = errCorrect;
  document.getElementById('err-cb-fail').textContent  = errWrong;
  document.getElementById('err-grade').textContent =
    pct>=90?'🔥 Excellent! Near-perfect grammar awareness.':
    pct>=70?'👍 Good work. Keep drilling weak areas.':
    pct>=50?'📖 Fair. Review the explanations carefully.':
    '💪 Keep going — repetition is the key!';
  document.getElementById('err-complete').classList.add('show');
}

function restartErr(newLevel){
  if(newLevel){
    const levels = Object.keys(ERROR_LEVELS);
    const next = levels[(levels.indexOf(errLevel)+1)%levels.length];
    errLevel = next;
    document.querySelectorAll('#err-levels .lvl-btn').forEach((b,i)=>{ b.classList.toggle('active-err', Object.keys(ERROR_LEVELS)[i]===next); });
  }
  loadErr(errLevel);
}

// ════════════════════════════════════════════════
//  COLLOCATIONS
// ════════════════════════════════════════════════

  fb.className = `fb show ${correct?'ok':'fail'}`;

function updateCollStats(){

  document.getElementById('coll-wrong').textContent   = collWrong;

function showCollComplete(){
  const pct = Math.round(collCorrect/collDeck.length*100);
  document.getElementById('coll-final-score').textContent = `${collCorrect}/${collDeck.length}`;
  document.getElementById('coll-cb-ok').textContent   = collCorrect;
  document.getElementById('coll-cb-fail').textContent  = collWrong;
  document.getElementById('coll-grade').textContent =
    pct>=90?'🔥 Excellent! Your English sounds very natural.':
    pct>=70?'👍 Good! Collocations take time — you\'re getting there.':
    pct>=50?'📖 Keep studying — collocations must be memorized in chunks.':
    '💪 Collocations are tricky — review and try again!';
  document.getElementById('coll-complete').classList.add('show');
}

function restartColl(newCat){
  if(newCat){
    const cats = Object.keys(COLL_CATEGORIES);
    const next = cats[(cats.indexOf(collCat)+1)%cats.length];
    collCat = next;
    document.querySelectorAll('#coll-levels .lvl-btn').forEach((b,i)=>{ b.classList.toggle('active-col', Object.keys(COLL_CATEGORIES)[i]===next); });
  }
  loadColl(collCat);
}

// ════════════════════════════════════════════════
//  SHARED
// ════════════════════════════════════════════════
function updateProg(m){
  const fill = document.getElementById('prog-fill');
  if(m==='error'){
    const done = Object.keys(errAnswers).length;
    fill.style.width = (done/errDeck.length*100)+'%';
    fill.className = 'prog-fill prog-error';
  } else {
    const done = Object.keys(collAnswers).length;
    fill.style.width = (done/collDeck.length*100)+'%';
    fill.className = 'prog-fill prog-coll';
  }
}

function switchMode(m){
  mode = m;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(`sec-${m}`).classList.add('active');
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`mb-${m}`).classList.add('active');
  const logo = document.getElementById('hdr-logo');
  logo.textContent = m==='error'?'🎯':'🔗';
  logo.style.background = m==='error'?'var(--error-accent)':'var(--coll-accent)';
  updateProg(m);
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
